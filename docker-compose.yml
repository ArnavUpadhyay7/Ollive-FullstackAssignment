services:
  mongodb:
    image: mongo:7
    container_name: ollive-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ollive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ollive-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/ollive
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.worker
    container_name: ollive-worker
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/ollive
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SERVICE_ROLE: worker
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  mongo_data:
